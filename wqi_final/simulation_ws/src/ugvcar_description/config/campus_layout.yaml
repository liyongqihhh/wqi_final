world_bounds:
  x_min: -90.0
  x_max: 90.0
  y_min: -80.0
  y_max: 80.0

map_resolution: 0.1

navigation:
  # Use a graded road cost: free center, low-cost guidance band, recoverable
  # shoulder, then lethal off-road. This prevents replanning from anchoring a
  # transient cornering offset as the new preferred lane.
  keepout_edge_margin: 1.0
  # On the 5.5 m main roads this leaves the same 1.0 m zero-cost core used by
  # the 4.0 m branches, so a shortest-path replan cannot hug one side.
  guidance_band_width: 1.25
  minimum_drivable_width: 1.0
  guidance_band_cost: 12
  soft_keepout_cost: 35

