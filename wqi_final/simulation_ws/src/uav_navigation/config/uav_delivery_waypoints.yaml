flight:
  home: logistics_center
  takeoff_altitude: 3.0
  cruise_altitude: 15.0
  minimum_corridor_altitude: 8.0
  maximum_corridor_altitude: 20.0
  maximum_delivery_altitude: 40.0
  first_floor_altitude: 1.6
  floor_height: 3.2
  delivery_altitude: 3.0
  landing_approach_altitude: 0.8
  takeoff_hover_duration: 5.0
  delivery_hover_duration: 5.0
  position_tolerance: 0.4
  segment_timeout: 180.0
  maximum_obstacle_height: 41.7
  safety_margin: 2.0
  obstacle_avoidance_mode: road_corridor_with_3d_safety_sphere

# Most XY coordinates match the UGV building-door stops. The four dormitory
# targets align with each building's front-door centre while sharing one UGV
# service stop at the road junction. Their 3.5 m facade standoff covers the
# safety sphere, braking distance, target tolerance, and residual margin.
# Floor and altitude are configurable defaults; altitude is the floor centre.
waypoints:
  logistics_center:
    label: Logistics Center UAV Pad
    x: 0.0
    y: -43.5
    yaw: 0.0
    payload_mass_kg: 0.0
    maximum_floor: 4
